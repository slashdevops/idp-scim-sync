name: "Release"

# https://help.github.com/es/actions/reference/workflow-syntax-for-github-actions#filter-pattern-cheat-sheet
on:
  push:
    tags:
      - v[0-9].[0-9]+.[0-9]*

env:
  MAKE_STOP_ON_ERRORS: true

permissions:
  id-token: write
  security-events: write
  actions: write
  contents: write
  pull-requests: read
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go 1.x
        id: go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod

      - name: Go version
        run: |
          go version

      - name: Test
        run: make test

  build:
    name: Build Distribution
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go 1.x
        id: go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod

      - name: Go version
        run: |
          go version

      - name: Build Distribution Cross-Platform
        run: |
          GIT_VERSION=${{ github.ref_name }} make build-dist

      - name: Build Distribution zip Assets
        run: |
          GIT_VERSION=${{ github.ref_name }} make build-dist-zip

      - name: Upload Distribution files
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: ./dist/
          retention-days: 1

  container_image:
    name: Publish Container Images
    needs: build
    uses: ./.github/workflows/container-image.yml

  create-github-release:
    name: Create Github Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Distribution files
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: ./dist/

      - name: Create Release
        id: create-github-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            dist/assets/**

  aws_sam:
    name: Create and Publish AWS SAM Serverless Application
    needs: create-github-release
    uses: slashdevops/idp-scim-sync/.github/workflows/aws-sam.yml@main
    secrets:
      AWS_OIDC_ROLE_TO_ASSUME: ${{ secrets.AWS_OIDC_ROLE_TO_ASSUME }}
      SAM_APP_BUCKET: ${{ secrets.SAM_APP_BUCKET }}
